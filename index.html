<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-blue-100 min-h-screen flex flex-col items-center py-10 my-20">

    <!-- main Heading -->
    <div class=" shadow-lg mb-6 text-center mb-10 ">
        <h2 class="text-3xl font-bold text-white shadow-lg">To-Do List App</h2>
    </div>
    <!-- Active Tasks Box -->
    <div class="bg-white w-96 p-6 rounded-2xl shadow-xl mb-6">
        <h1 class="text-2xl font-bold text-center mb-4">📝 Add Tasks</h1>

        <!-- Input & Add/Update Button -->
        <div class="flex gap-2 mb-4">
            <input type="text" id="todoInput" placeholder="Enter task"
                class="flex-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button id="addBtn" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">
                Add
            </button>
        </div>

        <ul id="todoList" class="space-y-2"></ul>
    </div>

    <!-- Completed Tasks Box -->
    <div id="completedBox" class="bg-white w-96 p-6 rounded-2xl shadow-xl hidden">
        <h2 class="text-xl font-semibold mb-4">Completed Tasks</h2>
        <ul id="completedList" class="space-y-2"></ul>
    </div>

    <script src="assets/js/script.js"></script>

</body>

</html>
